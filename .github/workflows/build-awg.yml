name: Build AWG

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g., 1.13.0-alpha.36)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            naive: true
          - name: entware-mipsel
            goos: linux
            goarch: mipsle
            gomips: softfloat
          - name: entware-aarch64
            goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ~1.25.9

      - name: Vendor dependencies and apply patches
        run: |
          go mod vendor
          if [ -x "./patches/amneziawg-go/apply.sh" ]; then
            echo "Applying AWG patches..."
            ./patches/amneziawg-go/apply.sh
          else
            echo "No patches to apply"
          fi

      - name: Clone cronet-go
        if: matrix.naive
        run: |
          set -xeuo pipefail
          CRONET_GO_VERSION=$(cat .github/CRONET_GO_VERSION)
          git init ~/cronet-go
          git -C ~/cronet-go remote add origin https://github.com/sagernet/cronet-go.git
          git -C ~/cronet-go fetch --depth=1 origin "$CRONET_GO_VERSION"
          git -C ~/cronet-go checkout FETCH_HEAD
          git -C ~/cronet-go submodule update --init --recursive --depth=1

      - name: Restore cronet-go headers in vendor tree
        if: matrix.naive
        run: |
          set -xeuo pipefail
          cp -r ~/cronet-go/include vendor/github.com/sagernet/cronet-go/

      - name: Regenerate Debian keyring
        if: matrix.naive
        run: |
          set -xeuo pipefail
          rm -f ~/cronet-go/naiveproxy/src/build/linux/sysroot_scripts/keyring.gpg
          cd ~/cronet-go
          GPG_TTY=/dev/null ./naiveproxy/src/build/linux/sysroot_scripts/generate_keyring.sh

      - name: Cache Chromium toolchain
        if: matrix.naive
        uses: actions/cache@v4
        with:
          path: |
            ~/cronet-go/naiveproxy/src/third_party/llvm-build/
            ~/cronet-go/naiveproxy/src/gn/out/
            ~/cronet-go/naiveproxy/src/chrome/build/pgo_profiles/
            ~/cronet-go/naiveproxy/src/out/sysroot-build/
          key: chromium-toolchain-${{ matrix.goarch }}-musl-${{ hashFiles('.github/CRONET_GO_VERSION') }}

      - name: Download Chromium toolchain
        if: matrix.naive
        run: |
          set -xeuo pipefail
          cd ~/cronet-go
          go run ./cmd/build-naive --target=linux/${{ matrix.goarch }} --libc=musl download-toolchain

      - name: Set Chromium toolchain environment
        if: matrix.naive
        run: |
          set -xeuo pipefail
          cd ~/cronet-go
          go run ./cmd/build-naive --target=linux/${{ matrix.goarch }} --libc=musl env >> $GITHUB_ENV

      - name: Build (naive)
        if: matrix.naive
        run: |
          mkdir -p dist
          OUTPUT_NAME="sing-box-${{ inputs.version }}-awg2.1-${{ matrix.name }}"

          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -v -trimpath -o "dist/${OUTPUT_NAME}" \
            -tags "with_gvisor,with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_v2ray_api,with_awg,with_naive_outbound,with_musl,badlinkname,tfogo_checklinkname0" \
            -ldflags "-s -w -buildid= -checklinkname=0 -X internal/godebug.defaultGODEBUG=multipathtcp=0 -X github.com/sagernet/sing-box/constant.Version=${{ inputs.version }}-awg2.1" \
            ./cmd/sing-box
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        if: ${{ ! matrix.naive }}
        run: |
          mkdir -p dist
          OUTPUT_NAME="sing-box-${{ inputs.version }}-awg2.1-${{ matrix.name }}"

          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOMIPS=${{ matrix.gomips }} \
          go build -v -trimpath -o "dist/${OUTPUT_NAME}" \
            -tags "with_gvisor,with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_awg,badlinkname,tfogo_checklinkname0" \
            -ldflags "-s -w -buildid= -checklinkname=0 -X internal/godebug.defaultGODEBUG=multipathtcp=0 -X github.com/sagernet/sing-box/constant.Version=${{ inputs.version }}-awg2.1" \
            ./cmd/sing-box
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ inputs.version }}-awg2.1"

          # Delete existing release if exists
          gh release delete "${VERSION}" --yes --repo ${{ github.repository }} 2>/dev/null || true

          # Create release notes
          cat > notes.md << 'EOF'
          ## sing-box with AWG 2.0 support

          ### AWG 2.0 Features:
          - H1-H4 ranges support
          - S3, S4 padding parameters
          - I1-I5 obfuscation chains
          - S4 keepalive padding fix (incoming keepalives handled correctly)
          - Counter tag `<c>` obfuscation support

          ### Platforms:
          - linux-amd64 — includes NaiveProxy outbound (`with_naive_outbound`, static musl build, larger binary)
          - entware-mipsel (softfloat)
          - entware-aarch64
          EOF

          # Create release
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${VERSION}" \
            --repo ${{ github.repository }} \
            --title "${VERSION}" \
            ${PRERELEASE_FLAG} \
            --notes-file notes.md \
            dist/*
